name: GitHub Metrics

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

concurrency:
  group: metrics
  cancel-in-progress: true

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.svg
          # "activity" mostra a atividade recente (commits, PRs, issues).
          base: header, activity, community, repositories
          base_indepth: yes
          # Linguagens via API do GitHub: respeita .gitattributes (HTML gerado excluído),
          # rápido e sem timeout. Python e o ecossistema de dados ficam dominantes.
          plugin_languages: yes
          plugin_languages_details: percentage
          plugin_languages_limit: 8
          plugin_languages_colors: github
          output_action: commit
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          committer_message: "chore(metrics): update metrics [skip ci]"
